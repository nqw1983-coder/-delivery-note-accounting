# 每天 18:05(北京时间)自动备份 Supabase 数据到仓库 backups/ 目录
#
# 详见 scripts/daily-backup.mjs 的注释和 backups/README.md
#
# 设计要点:
# - 每月一个 CSV 文件,覆盖式更新(repo 不膨胀)
# - git 历史天然记录每天变化(用 git log backups/2026-05.csv 看)
# - 数据量小,一年也就 < 1MB
# - 跟保活任务错开 5 分钟(保活 18:00,备份 18:05)

name: Daily Backup

on:
  schedule:
    - cron: "5 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run backup script
        run: node scripts/daily-backup.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --cached --quiet; then
            echo "数据没变化,跳过 commit"
            exit 0
          fi
          STAMP=$(date -u +"%Y-%m-%d %H:%MZ")
          git commit -m "backup: $STAMP"
          git push
          echo "✅ 已 commit + push"
